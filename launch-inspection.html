<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launching…</title>
  <style>
    /* basically invisible */
    html, body { margin:0; padding:0; background:#fff; }
    #msg { font: 12px Arial, sans-serif; color:#fff; padding: 6px; } /* white text = invisible */
    #err { font: 14px Arial, sans-serif; color:#b00020; padding: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="msg">Launching…</div>
  <div id="err" style="display:none;"></div>

<script>
(async () => {
  const errEl = document.getElementById('err');

  function showErr(t) {
    errEl.style.display = 'block';
    errEl.textContent = t;
    console.error(t);
  }

  const params = new URLSearchParams(window.location.search);
  const prjNumber = (params.get('prjNumber') || '').trim();

  if (!prjNumber) {
    showErr("Missing prjNumber.\nExample:\n  launch-inspection.html?prjNumber=2026022340");
    return;
  }

  // ✅ MUST be the URL from the trigger: "When an HTTP request is received" (HTTP POST URL)
  const flowUrl = "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ac46ced666924de5b50ec365b76821e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QK2AGPyM1vRd16g0ZvVgdwnJ2vnvIC_GsnJPwD6rIRM";

  try {
    const res = await fetch(flowUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prjNumber })
    });

    const text = await res.text();

    if (!res.ok) {
      showErr(`Flow call failed: HTTP ${res.status}\n\n${text}`);
      return;
    }

    let data;
    try { data = JSON.parse(text); }
    catch (e) {
      showErr("Flow returned non-JSON.\n\nResponse:\n" + text);
      return;
    }

    if (!data.redirectUrl) {
      showErr("Flow did not return redirectUrl.\n\nResponse:\n" + JSON.stringify(data, null, 2));
      return;
    }

    window.location.replace(data.redirectUrl);

  } catch (e) {
    showErr("Request error:\n" + (e && e.message ? e.message : String(e)));
  }
})();
</script>
</body>
</html>
