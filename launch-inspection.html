<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Launching…</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: #ffffff; /* invisible text */
    }
    /* Optional: if you WANT a tiny visible "Launching..." comment, change color to #666 */
    #msg { font-size: 12px; padding: 8px; }
    #err {
      display: none;
      color: #b00020;
      font-size: 14px;
      padding: 16px;
      white-space: pre-wrap;
      overflow: auto;
    }
  </style>
</head>
<body>
  <div id="msg">Launching…</div>
  <div id="err"></div>

  <script>
    // ========= CONFIG =========
    // Paste your RedirectToInspectionSurvey HTTP trigger URL here (expects POST)
    const PA_REDIRECT_FLOW_URL = "PASTE_YOUR_REDIRECT_FLOW_TRIGGER_URL_HERE";
    // ==========================

    function showError(text) {
      document.getElementById("msg").style.display = "none";
      const err = document.getElementById("err");
      err.style.display = "block";
      err.textContent = text;
      // also log for debugging
      console.error(text);
    }

    function getQueryParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    (async function main() {
      try {
        const prjNumber = (getQueryParam("prjNumber") || "").trim();
        if (!prjNumber) {
          showError("Missing prjNumber in URL.\n\nExample:\nlaunch-inspection.html?prjNumber=2026022340");
          return;
        }

        // Add a cache-buster to avoid any weird caching
        const actionUrl = PA_REDIRECT_FLOW_URL + (PA_REDIRECT_FLOW_URL.includes("?") ? "&" : "?") + "cb=" + Date.now();

        // Call your RedirectToInspectionSurvey flow via POST
        // IMPORTANT: use fetch + JSON body so you can keep "Who can trigger = Anyone"
        const resp = await fetch(actionUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prjNumber })
        });

        if (!resp.ok) {
          const txt = await resp.text().catch(() => "");
          showError("Flow call failed.\nHTTP " + resp.status + "\n\n" + txt);
          return;
        }

        // Flow should return: { "redirectUrl": "https://survey123..."}
        const data = await resp.json().catch(() => null);
        if (!data || !data.redirectUrl) {
          showError("Flow did not return redirectUrl.\nResponse:\n" + JSON.stringify(data, null, 2));
          return;
        }

        // Redirect into Survey123
        window.location.replace(data.redirectUrl);

      } catch (e) {
        showError("Error launching inspection.\n\n" + (e && e.stack ? e.stack : String(e)));
      }
    })();
  </script>
</body>
</html>
