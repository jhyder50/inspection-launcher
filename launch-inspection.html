<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Launching…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    /* Make it effectively invisible */
    html, body { margin: 0; padding: 0; background: transparent; }
  </style>
</head>
<body>
<script>
(async () => {
  // --- CONFIG ---
  const FLOW_URL = "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com/powerautomate/automations/direct/workflows/ceb05d10071a4f09999eac8c1521b401/triggers/manual/paths/invoke/run?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=AfCfzj4thNqc6P-xi0Dn5yAHzsTIltw_U4tEJ3K3Vc4";

  // Your Survey123 form
  const SURVEY_URL = "https://survey123.arcgis.com/share/e7c162b1fa4a46c99c785f6a5cc3ae00";

  // --- Read prjNumber from query string ---
  const params = new URLSearchParams(window.location.search);
  const prjNumber = (params.get("prjNumber") || "").trim();

  if (!prjNumber) {
    // Only show something if there's an error
    document.body.textContent = "Missing prjNumber in URL. Example: ?prjNumber=2026022340";
    return;
  }

  try {
    // --- POST to Flow ---
    const resp = await fetch(FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prjNumber })
    });

    // If flow returns 202/204 etc, still try to read body safely
    const text = await resp.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (e) { data = null; }

    if (!resp.ok) {
      throw new Error(`Flow call failed: HTTP ${resp.status}\n${text || "(no body)"}`);
    }

    // --- Determine redirect URL ---
    let redirectUrl = null;

    // Case 1: Flow returns { redirectUrl: "https://survey123..." }
    if (data && typeof data.redirectUrl === "string" && data.redirectUrl.startsWith("http")) {
      redirectUrl = data.redirectUrl;
    }

    // Case 2: Flow returns { prjNumber: "...", inspecNum: "0008" }
    if (!redirectUrl && data && typeof data.inspecNum === "string") {
      const inspecNum = data.inspecNum.trim();
      redirectUrl = `${SURVEY_URL}?field:prjNumber=${encodeURIComponent(prjNumber)}&field:inspecNum=${encodeURIComponent(inspecNum)}&field:applicName=${encodeURIComponent(params.get("applicName") || "")}&field:applicPhn=${encodeURIComponent(params.get("applicPhn") || "")}&field:applicEmail=${encodeURIComponent(params.get("applicEmail") || "")}&field:descrip=${encodeURIComponent(params.get("descrip") || "")}`;
    }

    // Case 3: Flow returns a plain string URL (rare, but let's support it)
    if (!redirectUrl && typeof data === "string" && data.startsWith("http")) {
      redirectUrl = data;
    }

    if (!redirectUrl) {
      throw new Error(`Flow did not return redirectUrl or inspecNum.\nResponse:\n${text || "(empty)"}`);
    }

    // --- Redirect ---
    window.location.replace(redirectUrl);

  } catch (err) {
    // Show error only if something went wrong (so normally it stays "invisible")
    document.body.style.fontFamily = "Segoe UI, Arial, sans-serif";
    document.body.style.padding = "16px";
    document.body.innerHTML =
      `<h3 style="margin:0 0 8px 0;color:#b00020;">Error launching inspection.</h3>
       <pre style="white-space:pre-wrap;margin:0;">${String(err.message || err)}</pre>`;
  }
})();
</script>
</body>
</html>
