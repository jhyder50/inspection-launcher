<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Launching inspection...</title>
<style>
html,body{
  margin:0;
  padding:0;
  background:#ffffff;
  font-family:Arial, sans-serif;
}
#status{
  font-size:12px;
  color:#888;
  padding:6px;
}
#error{
  display:none;
  color:#b00020;
  padding:12px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div id="status">Launching inspection...</div>
<div id="error"></div>

<script>

(async () => {

const FLOW_URL = "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ac46ced666924de5b50ec365b76821e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QK2AGPyM1vRd16g0ZvVgdwnJ2vnvIC_GsnJPwD6rIRM";

const params = new URLSearchParams(window.location.search);
const prjNumber = params.get("prjNumber");

const errorBox = document.getElementById("error");

function showError(msg){
  errorBox.style.display="block";
  errorBox.textContent=msg;
}

if(!prjNumber){
  showError("Missing prjNumber in URL");
  return;
}

try{

  const response = await fetch(FLOW_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      prjNumber: prjNumber
    })
  });

  const text = await response.text();

  if(!response.ok){
    showError("Flow call failed: HTTP "+response.status+"\n\n"+text);
    return;
  }

  let data;

  try{
    data = JSON.parse(text);
  }
  catch(e){
    showError("Flow returned non JSON:\n\n"+text);
    return;
  }

  if(!data.redirectUrl){
    showError("Flow did not return redirectUrl\n\n"+JSON.stringify(data,null,2));
    return;
  }

  window.location.replace(data.redirectUrl);

}
catch(err){
  showError("Request error:\n"+err);
}

})();

</script>

</body>
</html>
