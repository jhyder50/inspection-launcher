<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Launching…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin:0; padding:0; width:100%; height:100%; background:transparent; }
    body { overflow:hidden; }
  </style>
</head>
<body>
<script>
(async () => {
  try {
    // Read prjNumber from URL like: launch-inspection.html?prjNumber=2026022340
    const params = new URLSearchParams(window.location.search);
    const prjNumber = (params.get('prjNumber') || '').trim();

    if (!prjNumber) {
      // stay invisible but show a tiny console error for you
      console.error('Missing prjNumber in URL');
      return;
    }

    const flowUrl = 'https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ac46ced666924de5b50ec365b76821e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QK2AGPyM1vRd16g0ZvVgdwnJ2vnvIC_GsnJPwD6rIRM';

    // Add cachebuster in query string to avoid any weird caching
    const actionUrl = flowUrl + (flowUrl.includes('?') ? '&' : '?') + 'cb=' + Date.now();

    // POST JSON so the flow can read triggerBody()?['prjNumber']
    const resp = await fetch(actionUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prjNumber })
    });

    const text = await resp.text();

    // Try parse JSON
    let data = null;
    try { data = JSON.parse(text); } catch (e) {}

    // Best: flow returns redirectUrl
    if (data && data.redirectUrl) {
      window.location.replace(data.redirectUrl);
      return;
    }

    // Fallback: flow returns { prjNumber: "...", inspecNum: "0006" }
    if (data && data.prjNumber && data.inspecNum) {
      const url =
        'https://survey123.arcgis.com/share/e7c162b1fa4a46c99c785f6a5cc3ae00' +
        '?field:prjNumber=' + encodeURIComponent(data.prjNumber) +
        '&field:inspecNum=' + encodeURIComponent(data.inspecNum);
      window.location.replace(url);
      return;
    }

    // Last fallback: flow returned a URL string
    if (text.startsWith('http')) {
      window.location.replace(text.trim());
      return;
    }

    console.error('Flow did not return redirectUrl. Response:', text);
  } catch (err) {
    console.error('Error launching inspection:', err);
  }
})();
</script>
</body>
</html>
