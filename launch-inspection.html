<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Launching Inspection…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>

<body>
  <div id="status" style="font-family: Arial, sans-serif; padding: 16px;">
    Launching inspection form…
  </div>

  <script>
    // ✅ 1) Read prjNumber from this page URL:
    // https://jhyder50.github.io/inspection-launcher/launch-inspection.html?prjNumber=2026022340
    const params = new URLSearchParams(window.location.search);
    const prjNumber = params.get("prjNumber");

    const statusDiv = document.getElementById("status");

    if (!prjNumber) {
      statusDiv.innerHTML = "<span style='color:red;font-weight:bold'>Missing prjNumber in URL.</span>";
      throw new Error("Missing prjNumber");
    }

    // ✅ 2) Your Redirect flow trigger URL (HTTP Request trigger)
    // MUST be the URL generated by "When an HTTP request is received"
    // Replace the placeholder below with your real URL.
    const redirectFlowUrlBase = "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a4b68f7d17b6467bbe61dfadf1bd160f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=R7nAJo51p5zbZl-Pro4h1oNimLk-7ZRFTf9k1ZkUm3s";

    // ✅ 3) Call the Redirect flow as POST with prjNumber passed as a query param
    // (Your flow reads it using triggerOutputs()?['queries']?['prjNumber'])
    const callUrl =
      redirectFlowUrlBase +
      (redirectFlowUrlBase.includes("?") ? "&" : "?") +
      "prjNumber=" + encodeURIComponent(prjNumber) +
      "&cb=" + Date.now(); // cache buster

    statusDiv.innerHTML = "Requesting inspection number for project " + prjNumber + "…";

    fetch(callUrl, {
      method: "POST"
    })
    .then(async (resp) => {
      // If flow returns non-2xx, show the text so you can debug
      if (!resp.ok) {
        const txt = await resp.text();
        throw new Error("Flow call failed (" + resp.status + "): " + txt);
      }
      return resp.json();
    })
    .then((data) => {
      // ✅ Flow should return: { "redirectUrl": "https://survey123...&field:prjNumber=...&field:inspecNum=..." }
      if (!data || !data.redirectUrl) {
        throw new Error("Flow did not return redirectUrl. Returned: " + JSON.stringify(data));
      }

      statusDiv.innerHTML = "Opening inspection survey…";
      window.location.href = data.redirectUrl;
    })
    .catch((err) => {
      statusDiv.innerHTML =
        "<div style='color:red;font-weight:bold'>Error launching inspection</div>" +
        "<pre style='white-space:pre-wrap'>" + (err && err.message ? err.message : err) + "</pre>";
      console.error(err);
    });
  </script>
</body>
</html>
