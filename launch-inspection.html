<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Launching Inspection…</title>
</head>
<body>
  <p>Launching inspection form…</p>

  <script>
    // Read prjNumber from the URL (Experience Builder will pass it)
    const params = new URLSearchParams(window.location.search);
    const prjNumber = params.get('prjNumber') || '';

    if (!prjNumber) {
      document.body.innerHTML = '<p style="color:red;">Missing prjNumber in URL.</p>';
      throw new Error('Missing prjNumber');
    }

    // ✅ Use your RedirectToInspectionSurvey flow trigger URL (HTTP request trigger URL)
    // IMPORTANT: this must be the trigger URL from "When an HTTP request is received",
    // NOT a manual trigger link.
    const redirectFlowUrl =
      'https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a4b68f7d17b6467bbe61dfadf1bd160f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=R7nAJo51p5zbZl-Pro4h1oNimLk-7ZRFTf9k1ZkUm3s';

    // Build URL: we call the flow with prjNumber in the query string
    const actionUrl =
      redirectFlowUrl +
      (redirectFlowUrl.includes('?') ? '&' : '?') +
      'prjNumber=' + encodeURIComponent(prjNumber) +
      '&cb=' + Date.now();

    // Call the flow (POST), expect JSON: { "redirectUrl": "https://survey123..."}
    fetch(actionUrl, {
      method: 'POST'
    })
    .then(async (res) => {
      const text = await res.text();
      let data;
      try { data = JSON.parse(text); } catch (e) { data = null; }

      if (!res.ok) {
        throw new Error('Flow call failed: ' + res.status + ' ' + text);
      }
      if (!data || !data.redirectUrl) {
        throw new Error('Flow did not return redirectUrl. Response: ' + text);
      }

      // Redirect browser to Survey123 URL
      window.location.href = data.redirectUrl;
    })
    .catch((err) => {
      document.body.innerHTML =
        '<p style="color:red;">Error launching inspection.</p>' +
        '<pre style="white-space:pre-wrap;">' + (err && err.message ? err.message : err) + '</pre>';
      console.error(err);
    });
  </script>
</body>
</html>
