<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launching…</title>
  <style>
    /* Make it effectively invisible */
    html, body { margin:0; padding:0; background:#fff; color:#fff; }
    #msg { font-family: Arial, sans-serif; font-size: 14px; padding: 12px; color:#444; display:none; }
  </style>
</head>
<body>
<div id="msg"></div>

<script>
(async () => {
  // === CONFIG ===
  const FLOW_URL = "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ac46ced666924de5b50ec365b76821e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QK2AGPyM1vRd16g0ZvVgdwnJ2vnvIC_GsnJPwD6rIRM";

  // Your Survey123 target (inspection form)
  const SURVEY_BASE = "https://survey123.arcgis.com/share/e7c162b1fa4a46c99c785f6a5cc3ae00";

  // === Helpers ===
  const params = new URLSearchParams(window.location.search);
  const prjNumber = (params.get("prjNumber") || "").trim();

  const showError = (text) => {
    const el = document.getElementById("msg");
    el.style.display = "block";
    el.style.color = "crimson";
    el.textContent = text;
  };

  const extractFourDigits = (val) => {
    // Handles: "0006" or "2026022340-0006" or "-0001" etc.
    const s = String(val ?? "");
    const m = s.match(/(\d{4})\s*$/); // last 4 digits
    return m ? m[1] : "";
  };

  if (!prjNumber) {
    showError("Missing prjNumber in URL. Example: ?prjNumber=2026022340");
    return;
  }

  try {
    // POST JSON to the flow trigger
    const resp = await fetch(FLOW_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prjNumber })
    });

    if (!resp.ok) {
      const txt = await resp.text().catch(() => "");
      throw new Error(`Flow call failed: HTTP ${resp.status} ${txt}`);
    }

    const data = await resp.json().catch(() => ({}));

    // 1) If flow returns redirectUrl, use it
    if (data && typeof data.redirectUrl === "string" && data.redirectUrl.startsWith("http")) {
      window.location.replace(data.redirectUrl);
      return;
    }

    // 2) Otherwise, build Survey123 URL from prjNumber + inspecNum
    const inspecNumRaw = data?.inspecNum ?? "";
    const inspec4 = extractFourDigits(inspecNumRaw);

    if (!inspec4) {
      throw new Error(`Flow did not return redirectUrl and inspecNum was not usable. Response: ${JSON.stringify(data)}`);
    }

    const surveyUrl =
      `${SURVEY_BASE}` +
      `?field:prjNumber=${encodeURIComponent(prjNumber)}` +
      `&field:inspecNum=${encodeURIComponent(inspec4)}`;

    window.location.replace(surveyUrl);
  } catch (e) {
    showError("Error launching inspection. " + (e?.message || e));
    console.error(e);
  }
})();
</script>
</body>
</html>
