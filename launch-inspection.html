<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="referrer" content="no-referrer" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Launching inspection…</title>
  <style>
    html, body { margin:0; padding:0; background:#fff; color:#111; font-family: Arial, sans-serif; }
    /* Keep it basically "invisible" */
    .msg { padding: 8px 10px; font-size: 12px; color:#666; }
    .err { padding: 12px 10px; font-size: 14px; color:#b00020; white-space: pre-wrap; }
  </style>
</head>

<body>
  <div id="status" class="msg">Launching inspection…</div>

  <script>
    (async () => {
      const statusEl = document.getElementById('status');

      // 1) Read prjNumber from URL query string
      const params = new URLSearchParams(window.location.search);
      const prjNumber = (params.get('prjNumber') || '').trim();

      if (!prjNumber) {
        statusEl.className = 'err';
        statusEl.textContent = "Missing prjNumber in URL.\n\nExample:\n  launch-inspection.html?prjNumber=2026022340";
        return;
      }

      // 2) Your Power Automate "When an HTTP request is received" trigger URL
      // IMPORTANT: This flow must accept POST, and you should use Request Body JSON Schema
      // with { prjNumber: string } and use triggerBody()?['prjNumber'] in the flow.
      const flowUrl =
        "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/a4b68f7d17b6467bbe61dfadf1bd160f/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=R7nAJo51p5zbZl-Pro4h1oNimLk-7ZRFTf9k1ZkUm3s";

      // Optional cache buster (keeps proxies from caching)
      const urlWithCb = flowUrl + (flowUrl.includes('?') ? '&' : '?') + 'cb=' + Date.now();

      try {
        // 3) Call the flow with POST JSON body
        const res = await fetch(urlWithCb, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prjNumber })
        });

        const text = await res.text();

        if (!res.ok) {
          statusEl.className = 'err';
          statusEl.textContent =
            `Flow call failed: HTTP ${res.status}\n\n${text}`;
          return;
        }

        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          statusEl.className = 'err';
          statusEl.textContent =
            "Flow did not return JSON.\n\nResponse:\n" + text;
          return;
        }

        const redirectUrl = data.redirectUrl || data.url || data.location;

        if (!redirectUrl) {
          statusEl.className = 'err';
          statusEl.textContent =
            "Flow did not return redirectUrl.\n\nResponse JSON:\n" + JSON.stringify(data, null, 2);
          return;
        }

        // 4) Redirect to Survey123
        window.location.replace(redirectUrl);

      } catch (err) {
        statusEl.className = 'err';
        statusEl.textContent =
          "Error launching inspection.\n\n" + (err && err.message ? err.message : String(err));
      }
    })();
  </script>
</body>
</html>
