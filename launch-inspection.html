<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Launching inspection...</title>
<style>
html,body{margin:0;padding:0;background:#fff;font-family:Arial,sans-serif}
#msg{font-size:12px;color:#fff;padding:6px} /* invisible */
#err{display:none;font-size:14px;color:#b00020;padding:12px;white-space:pre-wrap}
</style>
</head>
<body>

<div id="msg">Launching...</div>
<div id="err"></div>

<script>
(async () => {

const FLOW_URL = "https://default5aec36760dde43ad8e4477400be574.ab.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ac46ced666924de5b50ec365b76821e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=QK2AGPyM1vRd16g0ZvVgdwnJ2vnvIC_GsnJPwD6rIRM";

const params = new URLSearchParams(window.location.search);
const prjNumber = params.get("prjNumber");

const errBox = document.getElementById("err");

function showError(msg){
  errBox.style.display="block";
  errBox.textContent=msg;
}

if(!prjNumber){
  showError("Missing prjNumber in URL");
  return;
}

try{

  const res = await fetch(FLOW_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      prjNumber: prjNumber
    })
  });

  const text = await res.text();

  if(!res.ok){
    showError("Flow call failed: HTTP "+res.status+"\n\n"+text);
    return;
  }

  let data;

  try{
    data = JSON.parse(text);
  }
  catch(e){
    showError("Flow returned non-JSON:\n\n"+text);
    return;
  }

  if(!data.redirectUrl){
    showError("Flow did not return redirectUrl.\n\nResponse:\n"+JSON.stringify(data,null,2));
    return;
  }

  window.location.replace(data.redirectUrl);

}
catch(err){
  showError("Request error:\n"+err);
}

})();
</script>

</body>
</html>
